name: God-Doctor-Continuous

on:
  schedule:
    - cron: '0 * * * *'          # প্রতি ১ ঘণ্টায় অটোমেটিক রান
  workflow_dispatch:              # ম্যানুয়ালি রান করার জন্য

permissions:
  contents: write                 # রিপোজিটরিতে পুশ করতে দরকার

concurrency:
  group: doctor-nonstop
  cancel-in-progress: true        # আগের রান চলতে থাকলে বাতিল করে নতুন রান শুরু করবে

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 360          # সর্বোচ্চ ৬ ঘণ্টা চলবে

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0           # সম্পূর্ণ গিট হিস্টরি প্রয়োজন (pull/rebase এর জন্য)

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # পূর্ববর্তী রানের কোনো ঝুলন্ত রিবেস অবস্থা পরিষ্কার করা
      - name: Cleanup stale rebase state
        run: |
          git rebase --abort 2>/dev/null || true
          rm -rf .git/rebase-merge

      - name: Run Master Doctor
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REPOSITORY: ${{ github.repository }}
        run: python master_doctor.py   # কোনো অতিরিক্ত ডট (..) যেন না থাকে
