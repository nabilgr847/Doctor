name: God-Doctor-Continuous

on:
  schedule:
    - cron: '0 * * * *'          # প্রতি ১ ঘণ্টায় চালু হবে
  workflow_dispatch:              # ম্যানুয়ালি চালু/বন্ধ করার জন্য

concurrency:
  group: doctor-nonstop
  cancel-in-progress: false

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 360          # ৬ ঘণ্টা ধরে চলবে, তারপর আবার নতুন করে চালু হবে

    steps:
      - name: কোড লোড করা হচ্ছে
        uses: actions/checkout@v4

      - name: পাইথন সেটআপ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: জরুরি লাইব্রেরি ইন্সটল
        run: pip install -r requirements.txt

      - name: মাস্টার ডক্টর ইঞ্জিন চালু
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python master_doctor.py

      - name: নতুন ডেটাসেট গিটহাবে জমা করা
        run: |
          git config user.name "God-Doctor-Bot"
          git config user.email "bot@doctor.ai"
          git add dataset*.jsonl
          git commit -m "Auto-update dataset $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push
