name: God-Doctor-Continuous

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: doctor-nonstop
  cancel-in-progress: false

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Master Doctor
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python master_doctor.py
      - name: Commit and Push dataset
        run: |
          git config user.name "God-Doctor-Bot"
          git config user.email "bot@doctor.ai"
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git
          if ls dataset*.jsonl 1> /dev/null 2>&1; then
            git add dataset*.jsonl
            git commit -m "Auto-update dataset $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
            git push
          else
            echo "No dataset files to commit"
          fi
