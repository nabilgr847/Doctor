name: God-Doctor-Continuous
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: doctor-nonstop
  cancel-in-progress: false
jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      # Clean up any leftover rebase state from previous runs
      - run: |
          git rebase --abort 2>/dev/null || true
          rm -rf .git/rebase-merge
      - name: Run Master Doctor
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REPOSITORY: ${{ github.repository }}
        run: python master_doctor.py
